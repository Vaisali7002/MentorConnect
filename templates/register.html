{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2>Create Account</h2>

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Enter your name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Enter password"
            required
        >

        <select name="role">

            <option>Student</option>

            <option>Mentor</option>

        </select>

        <button type="submit">

            Register

        </button>

    </form>

</div>

{% endblock %}
