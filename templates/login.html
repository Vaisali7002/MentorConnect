{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2>Login</h2>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Enter email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Enter password"
            required
        >

        <button type="submit">

            Login

        </button>

    </form>

</div>

{% endblock %}
