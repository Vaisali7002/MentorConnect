<!DOCTYPE html>
<html>

<head>

    <title>MentorConnect</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

    <div class="navbar">

    <a href="/">Home</a>

    {% if session.get("role") == "Student" %}

        <a href="/student_dashboard">My Dashboard</a>

        <a href="/request">New Request</a>

        <a href="/logout">Logout</a>

    {% elif session.get("role") == "Mentor" %}

        <a href="/dashboard">Mentor Dashboard</a>

        <a href="/logout">Logout</a>

    {% else %}

        <a href="/register">Register</a>

        <a href="/login">Login</a>

    {% endif %}

</div>


    {% block content %}

    {% endblock %}

</body>

</html>
